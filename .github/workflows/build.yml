name: CI
on:
  pull_request:
    branches: [ '**', '!update/**', '!pr/**' ]
  push:
    branches: [ '**', '!update/**', '!pr/**' ]
    tags: [ v* ]

concurrency:
  group: ${{ github.workflow }} @ ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        os: [ ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest ]
        include:
          - os: ubuntu-latest
            platform: x86_64-unknown-linux
          - os: ubuntu-24.04-arm
            platform: aarch64-unknown-linux
          - os: windows-latest
            platform: x86_64-pc-windows.exe
          - os: macos-latest
            platform: aarch64-apple-darwin

    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v6
      - uses: coursier/cache-action@v8
      - uses: VirtusLab/scala-cli-setup@main
        with:
          scala-cli-version: "latest"
          power: 'true'
          jvm: 'graalvm-community@21'
      - run: scala-cli test --server=false .
      - id: get_version
        shell: bash
        run: |
          ref="${{github.ref}}"
          if [[ $ref =~ ^"refs/tags/v" ]]; then
            version=${ref#refs/tags/v}
          else
            sha="${{github.sha}}"
            version=${sha:0:8}
          fi
          echo "VERSION=$version" >> $GITHUB_ENV
      - name: Build native image
        run: |
          mkdir -p target
          scala-cli package --server=false --native-image --graalvm-jvm-id graalvm-community@21 -o target/micro-maven-resolver-${{matrix.platform}} . -- --no-fallback --strict-image-heap
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: micro-maven-resolver-${{VERSION}}-${{matrix.platform}}
          path: target/micro-maven-resolver-${{matrix.platform}}

  publish:
    name: Publish Artifacts
    needs: [ build ]
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: assets
      - id: assets
        run: |
          # Get the absolute path of the assets directory
          ASSETS_DIR=$(realpath assets)
          # Find all files matching a pattern in the assets directory and emit them as absolute paths
          files=$(find $ASSETS_DIR -type f | tr '\n' ',' | sed 's/,$//')
          echo "MYFILES=$files" >> $GITHUB_ENV
      - name: Upload release binaries
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          files: "${{ MYFILES }}"
